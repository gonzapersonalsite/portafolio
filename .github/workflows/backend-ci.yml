name: backend-ci

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/portfolio-backend/**'
  workflow_dispatch:

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/portfolio-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Ensure gradlew is executable
        run: chmod +x gradlew
      - name: Run tests
        run: ./gradlew test --no-daemon
      - name: Trigger Render deploy
        if: success() && env.RENDER_DEPLOY_HOOK_URL != ''
        run: |
          http_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")
          echo "Render hook HTTP status: $http_code"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Deploy hook failed"
            exit 1
          fi
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
