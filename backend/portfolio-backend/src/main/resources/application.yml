server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: portfolio-backend
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/portfolio_db}
    username: ${SPRING_DATASOURCE_USERNAME:portfolio_user}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}
    baseline-description: "${FLYWAY_BASELINE_DESCRIPTION:Existing Hibernate-managed schema}"
    validate-on-migrate: true
    locations: classpath:db/migration
  
  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD}

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD}
    email: ${ADMIN_EMAIL}
  password-reset:
    frontend-url: ${FRONTEND_URL:http://localhost:5173}
    token-expiration-minutes: ${PASSWORD_RESET_TOKEN_EXPIRATION:15}

resend:
  api-key: ${RESEND_API_KEY:}
  from-email: ${RESEND_FROM_EMAIL:onboarding@resend.dev}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost,http://localhost:3000}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin,X-Requested-With}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  public:
    capacity: ${RATE_LIMIT_PUBLIC_CAPACITY:100}
    tokens: ${RATE_LIMIT_PUBLIC_TOKENS:10}
  admin:
    capacity: ${RATE_LIMIT_ADMIN_CAPACITY:50}
    tokens: ${RATE_LIMIT_ADMIN_TOKENS:5}

logging:
  level:
    root: INFO
    com.gonzalomartinez.portfolio_backend: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
      probes:
        enabled: false
  health:
    db:
      enabled: false
    datasource:
      enabled: false
    livenessState:
      enabled: false
    readinessState:
      enabled: false
